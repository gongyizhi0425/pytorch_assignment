# SmoothQuant (W8A8) assignment config
# Run:  python src/run_smoothquant.py --config configs/smoothquant.yaml

seed: 42

model:
  name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  dtype: float16
  device: auto
  # cache_dir: /home/gyz/hf_cache

eval:
  dataset: wikitext
  config: wikitext-2-raw-v1
  split: test
  max_eval_tokens: 60000
  block_size: 512

calibration:
  dataset: wikitext
  config: wikitext-2-raw-v1
  split: train
  num_samples: 64
  seq_len: 128

smoothquant:
  alphas: [0.0, 0.25, 0.5, 0.75]

speed:
  prefill_seq_len: 256
  decode_new_tokens: 32
  repeats: 5

outlier:
  top_k: 20        # top-K outlier channels to display

output:
  out_dir: results_smoothquant
  run_name: tinylama_smoothquant
